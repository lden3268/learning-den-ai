<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning DEN AI — Learn, Evolve, Win</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --navy:#2c3e6b;--navy-light:#3d527a;--navy-pale:#deeaf7;
  --gold:#c9943a;--gold-light:#e8b84b;--gold-pale:#fdf6e3;
  --white:#f0f8fd;--text:#1a2030;--muted:#6b7a99;--border:#d8dff0;
  --card:#ffffff;--green:#2d6a4f;--red:#c0392b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--white);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
header{background:linear-gradient(135deg,#1e3a5f 0%,#2a5080 100%);padding:12px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;border-bottom:3px solid var(--gold);box-shadow:0 4px 20px rgba(30,58,95,0.3);}
.logo-wrap{display:flex;align-items:center;gap:14px;}
.logo-img{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);background:white;}
.logo-text{font-family:"Playfair Display",serif;font-size:20px;color:white;line-height:1.1;}
.logo-text span{color:var(--gold-light);}
.logo-sub{font-size:10px;color:#8899cc;letter-spacing:2.5px;text-transform:uppercase;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:12px;}
.user-badge{background:var(--gold);color:var(--navy);padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;display:none;}
.btn-teacher-header{background:transparent;border:1.5px solid rgba(255,255,255,0.25);color:white;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all 0.2s;}
.btn-teacher-header:hover{background:rgba(255,255,255,0.1);}

/* ── LANDING PAGE ── */
#landingPage{display:block;}
.landing-hero{background:linear-gradient(135deg,#1e3a5f 0%,#2a5080 50%,#1a4a6b 100%);padding:80px 40px 90px;text-align:center;position:relative;overflow:hidden;}
.landing-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(201,148,58,0.12) 0%,transparent 60%),radial-gradient(ellipse at 70% 20%,rgba(100,120,200,0.1) 0%,transparent 50%);pointer-events:none;}
.hero-logo{width:180px;height:180px;border-radius:50%;object-fit:cover;border:5px solid var(--gold);margin:0 auto 28px;display:block;box-shadow:0 0 60px rgba(201,148,58,0.5),0 0 120px rgba(201,148,58,0.2);}
.landing-hero h1{font-family:"Playfair Display",serif;font-size:clamp(36px,5vw,64px);color:white;line-height:1.1;margin-bottom:16px;}
.landing-hero h1 em{color:var(--gold-light);font-style:italic;}
.landing-hero p{font-size:17px;color:#aab5d5;max-width:600px;margin:0 auto 32px;line-height:1.8;}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.btn-hero-primary{padding:16px 36px;background:var(--gold);color:var(--navy);border:none;border-radius:12px;font-family:"Playfair Display",serif;font-size:18px;font-weight:700;cursor:pointer;transition:all 0.25s;letter-spacing:0.3px;}
.btn-hero-primary:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,148,58,0.4);}
.btn-hero-secondary{padding:16px 36px;background:transparent;color:white;border:2px solid rgba(255,255,255,0.3);border-radius:12px;font-family:"DM Sans",sans-serif;font-size:16px;cursor:pointer;transition:all 0.25s;}
.btn-hero-secondary:hover{background:rgba(255,255,255,0.1);}

.features-section{padding:70px 40px;background:var(--white);}
.features-section h2{font-family:"Playfair Display",serif;font-size:36px;text-align:center;color:var(--navy);margin-bottom:10px;}
.features-sub{text-align:center;color:var(--muted);font-size:15px;margin-bottom:50px;}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;max-width:1000px;margin:0 auto;}
.feature-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:30px 26px;transition:all 0.25s;}
.feature-card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 12px 40px rgba(26,39,68,0.1);}
.feature-icon{font-size:36px;margin-bottom:14px;}
.feature-card h3{font-family:"Playfair Display",serif;font-size:18px;color:var(--navy);margin-bottom:8px;}
.feature-card p{font-size:14px;color:var(--muted);line-height:1.7;}

.stats-bar{background:var(--navy);padding:40px;display:flex;justify-content:center;gap:60px;flex-wrap:wrap;}
.stat-item{text-align:center;}
.stat-num{font-family:"Playfair Display",serif;font-size:36px;color:var(--gold-light);font-weight:700;}
.stat-label{font-size:13px;color:#8899cc;letter-spacing:1px;text-transform:uppercase;margin-top:4px;}

/* ── APP ── */
#appPage{display:none;}
.container{max-width:860px;margin:0 auto;padding:40px 24px 80px;}

.login-card{background:white;border:1.5px solid var(--border);border-radius:24px;padding:44px;text-align:center;max-width:480px;margin:0 auto;}
.login-card .logo-login{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);margin:0 auto 20px;display:block;}
.login-card h2{font-family:"Playfair Display",serif;font-size:26px;color:var(--navy);margin-bottom:8px;}
.login-card p{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
.input-field{width:100%;padding:14px 18px;border:1.5px solid var(--border);border-radius:12px;font-family:"DM Sans",sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;margin-bottom:12px;}
.input-field:focus{border-color:var(--navy);}
.input-field.upper{text-transform:uppercase;letter-spacing:2px;}
.btn-primary{width:100%;padding:15px;background:var(--navy);color:white;border:none;border-radius:12px;font-family:"Playfair Display",serif;font-size:17px;cursor:pointer;transition:all 0.2s;margin-top:4px;}
.btn-primary:hover{background:var(--navy-light);}
.login-error{color:var(--red);font-size:13px;margin-top:8px;display:none;}

.student-bar{background:var(--navy-pale);border:1px solid var(--border);border-radius:14px;padding:14px 20px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.student-bar .info{font-size:14px;color:var(--navy);font-weight:500;}
.student-bar .stats{font-size:13px;color:var(--muted);}
.btn-small{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;font-family:"DM Sans",sans-serif;transition:all 0.2s;}
.btn-small:hover{color:var(--red);border-color:var(--red);}

.step-card{background:white;border:1.5px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}
.step-label{font-size:11px;font-weight:600;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.grade-row{display:flex;gap:10px;}
.grade-btn{flex:1;padding:14px;border:2px solid var(--border);border-radius:14px;background:white;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.25s;text-align:center;letter-spacing:0.3px;}
.grade-btn:hover{border-color:var(--navy);color:var(--navy);}
.grade-btn.active{background:linear-gradient(135deg,#1e3a5f,#2a5080);border-color:#1e3a5f;color:white;box-shadow:0 4px 15px rgba(30,58,95,0.3);}

.upload-zone{border:2px dashed var(--border);border-radius:16px;padding:40px 24px;text-align:center;cursor:pointer;transition:all 0.25s;position:relative;}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--navy);background:var(--navy-pale);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:40px;margin-bottom:12px;}
.upload-zone h3{font-family:"Playfair Display",serif;font-size:18px;color:var(--text);margin-bottom:6px;}
.upload-zone p{font-size:13px;color:var(--muted);}
.badge-gold{display:inline-block;margin-top:10px;background:var(--gold);color:var(--navy);font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;letter-spacing:0.5px;}

.image-counter{display:none;align-items:center;justify-content:space-between;margin-bottom:10px;padding:10px 16px;background:var(--navy-pale);border:1px solid var(--border);border-radius:10px;}
.image-counter span{font-size:14px;color:var(--navy);font-weight:500;}
.image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:20px;}
.img-thumb{position:relative;border-radius:10px;overflow:hidden;border:1.5px solid var(--border);aspect-ratio:1;background:#f0f4f8;}
.img-thumb img{width:100%;height:100%;object-fit:cover;}
.img-thumb .remove-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(192,57,43,0.9);color:white;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.img-thumb .img-num{position:absolute;bottom:4px;left:6px;background:rgba(26,39,68,0.8);color:white;font-size:11px;padding:2px 6px;border-radius:5px;}

.progress-wrap{display:none;margin-bottom:18px;}
.progress-wrap.active{display:block;}
.progress-label{font-size:13px;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;}
.progress-bar-bg{height:8px;background:var(--border);border-radius:10px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--gold));border-radius:10px;transition:width 0.4s ease;width:0%;}

.error-box{background:#fff5f5;border:1.5px solid #f5c6c6;border-radius:12px;padding:14px 18px;color:var(--red);font-size:14px;display:none;margin-bottom:16px;}

.btn-generate{width:100%;padding:18px;background:linear-gradient(135deg,#1e3a5f 0%,#2a5080 100%);color:white;border:2px solid transparent;border-radius:14px;font-family:"Playfair Display",serif;font-size:20px;cursor:pointer;transition:all 0.25s;margin-bottom:32px;letter-spacing:0.5px;}
.btn-generate:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 30px rgba(30,58,95,0.35);border-color:var(--gold);}
.btn-generate:disabled{opacity:0.5;cursor:not-allowed;}

.loader{display:none;text-align:center;padding:44px 20px;}
.loader.active{display:block;}
.dots{display:flex;justify-content:center;gap:8px;margin-bottom:16px;}
.dot{width:12px;height:12px;background:var(--navy);border-radius:50%;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:0.2s;background:var(--gold);}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
.loader p{color:var(--muted);font-size:15px;}
.loader .sub{font-size:13px;color:#8899cc;margin-top:6px;}

#results{display:none;animation:fadeUp 0.5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.results-header{background:linear-gradient(135deg,#1e3a5f 0%,#2a5080 100%);border-radius:20px;padding:26px 28px;margin-bottom:24px;color:white;box-shadow:0 8px 30px rgba(30,58,95,0.2);}
.results-header h2{font-family:"Playfair Display",serif;font-size:22px;color:var(--gold-light);margin-bottom:6px;}
.results-header p{font-size:14px;color:#aab5d5;margin-bottom:16px;}
.result-actions{display:flex;gap:10px;flex-wrap:wrap;}
.btn-gold{padding:11px 22px;background:var(--gold);color:var(--navy);border:none;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-gold:hover{background:var(--gold-light);}
.btn-outline-w{padding:11px 22px;background:transparent;color:white;border:1.5px solid rgba(255,255,255,0.3);border-radius:10px;font-family:"DM Sans",sans-serif;font-size:14px;cursor:pointer;transition:all 0.2s;}
.btn-outline-w:hover{background:rgba(255,255,255,0.1);}

.result-block{margin-bottom:28px;border:1.5px solid var(--border);border-radius:20px;overflow:hidden;}
.result-block-header{background:linear-gradient(135deg,#1e3a5f,#2a5080);padding:14px 20px;display:flex;align-items:center;gap:14px;}
.result-block-header img{width:46px;height:46px;object-fit:cover;border-radius:8px;border:2px solid var(--gold);flex-shrink:0;}
.rb-title{font-family:"Playfair Display",serif;font-size:16px;color:white;}
.rb-sub{font-size:12px;color:#8899cc;}
.btn-copy-s{margin-left:auto;padding:7px 16px;background:var(--gold);color:var(--navy);border:none;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}

.section-wrap{background:white;border-top:1px solid var(--border);}
.sec-head{padding:12px 20px;background:var(--navy-pale);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sec-icon{font-size:16px;}
.sec-title{font-family:"Playfair Display",serif;font-size:14px;color:var(--navy);font-weight:700;}
.sec-body{padding:18px 22px;font-size:14px;line-height:1.9;color:var(--text);}
.sec-body p{margin-bottom:4px;}
.sec-body h3,.sec-body strong{color:var(--navy);font-weight:700;}
.sec-body .q{font-weight:700;color:var(--navy);margin-top:10px;display:block;}
.sub-grade-btn{flex:0 0 auto!important;min-width:80px!important;padding:10px 12px!important;font-size:13px!important;}
.subject-btn{flex:0 0 auto!important;min-width:110px!important;padding:10px 14px!important;font-size:13px!important;}
.difficulty-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle;}
.difficulty-hard{background:#fff0f0;color:#c0392b;border:1px solid #f5c6c6;}
.difficulty-med{background:#fff8e7;color:#c9943a;border:1px solid #f5e0a0;}
.whatsapp-btn{padding:11px 22px;background:#25D366;color:white;border:none;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
.whatsapp-btn:hover{background:#1db954;}
.sec-body .a{color:var(--text);margin-bottom:6px;display:block;padding-left:12px;}

.save-status{font-size:13px;color:var(--green);text-align:center;padding:10px;display:none;font-weight:500;}
.firebase-note{background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:10px 16px;font-size:12px;color:#8a6d00;margin-bottom:16px;display:none;}

.history-section{margin-top:44px;}
.history-section h2{font-family:"Playfair Display",serif;font-size:22px;color:var(--navy);margin-bottom:18px;}
.history-item{background:white;border:1.5px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.h-date{font-size:12px;color:var(--muted);margin-bottom:3px;}
.h-title{font-size:14px;font-weight:500;color:var(--text);}
.h-count{font-size:12px;color:var(--navy);}

/* ── TEACHER DASHBOARD ── */
#teacherPage{display:none;}
.dashboard-wrap{max-width:1000px;margin:0 auto;padding:36px 24px 80px;}
.dashboard-header{background:linear-gradient(135deg,#1e3a5f,#2a5080);border-radius:20px;padding:28px 30px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:0 8px 30px rgba(30,58,95,0.2);}
.dashboard-header h1{font-family:"Playfair Display",serif;font-size:26px;color:white;}
.dashboard-header p{font-size:13px;color:#aab5d5;margin-top:4px;}
.dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
.dash-stat{background:white;border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;text-align:center;}
.dash-stat .num{font-family:"Playfair Display",serif;font-size:30px;color:var(--navy);font-weight:700;}
.dash-stat .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.student-list{background:white;border:1.5px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:24px;}
.student-list-header{background:var(--navy-pale);padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.student-list-header h3{font-family:"Playfair Display",serif;font-size:16px;color:var(--navy);}
.student-row{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;cursor:pointer;transition:background 0.2s;}
.student-row:hover{background:var(--navy-pale);}
.student-row:last-child{border-bottom:none;}
.s-id{font-weight:600;color:var(--navy);font-size:14px;}
.s-info{font-size:12px;color:var(--muted);}
.btn-view{padding:6px 14px;background:var(--navy-pale);color:var(--navy);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;}
.btn-view:hover{background:var(--navy);color:white;}
.session-detail{background:white;border:1.5px solid var(--border);border-radius:18px;padding:24px;display:none;}
.session-detail h3{font-family:"Playfair Display",serif;font-size:18px;color:var(--navy);margin-bottom:16px;}
.session-item{border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:10px;cursor:pointer;}
.session-item:hover{border-color:var(--navy);}

footer{background:var(--navy);text-align:center;padding:24px;color:#6677aa;font-size:13px;border-top:1px solid rgba(255,255,255,0.05);}
footer strong{color:var(--gold-light);}
footer a{color:#8899cc;text-decoration:none;}

@media(max-width:640px){
  header{padding:12px 16px;}
  .landing-hero{padding:50px 18px 60px;}
  .features-section{padding:44px 18px;}
  .stats-bar{gap:30px;padding:30px 18px;}
  .container{padding:24px 14px 60px;}
  .grade-row{flex-direction:column;}
}
</style>
</head>
<body>
